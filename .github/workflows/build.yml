name: Build PicoKernel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib qemu-system-i386 genisoimage

    - name: Build PicoKernel
      run: |
        chmod +x build.sh
        bash -c "cd $(pwd) && ./build.sh"

    - name: Create bootable ISO image
      run: |
        # 创建 ISO 目录结构
        mkdir -p iso/boot/grub
        
        # 复制软盘镜像到 ISO 目录
        cp build/picokernel.img iso/
        
        # 创建 GRUB 配置文件
        echo 'set timeout=0' > iso/boot/grub/grub.cfg
        echo 'set default=0' >> iso/boot/grub/grub.cfg
        echo '' >> iso/boot/grub/grub.cfg
        echo 'menuentry "PicoKernel" {' >> iso/boot/grub/grub.cfg
        echo '  loopback loop /picokernel.img' >> iso/boot/grub/grub.cfg
        echo '  chainloader (loop)+1' >> iso/boot/grub/grub.cfg
        echo '  boot' >> iso/boot/grub/grub.cfg
        echo '}' >> iso/boot/grub/grub.cfg
        
        # 安装 GRUB 到 ISO 镜像
        sudo apt-get install -y grub2-common xorriso
        grub-mkrescue -o build/picokernel.iso iso/

    - name: Test kernel
      run: |
        qemu-system-i386 -fda build/picokernel.img -nographic -monitor none -serial none -parallel none -qmp tcp:localhost:4444,server,nowait &
        sleep 5
        kill $!

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: picokernel
        path: build/
