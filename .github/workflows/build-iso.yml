name: Build Linux ISO Images

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: '1.0.0'

env:
  KERNEL_VERSION: 6.10.7
  CACHE_KEY: kernel-6.10.7

jobs:
  build-kernel:
    name: Build Linux Kernel (Cached)
    runs-on: ubuntu-latest
    outputs:
      kernel-cache-hit: ${{ steps.cache-kernel.outputs.cache-hit }}
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev wget

    - name: Cache Linux kernel
      id: cache-kernel
      uses: actions/cache@v4
      with:
        path: kernel_build
        key: ${{ env.CACHE_KEY }}

    - name: Download and extract Linux kernel
      if: steps.cache-kernel.outputs.cache-hit != 'true'
      run: |
        mkdir -p kernel_build
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${{ env.KERNEL_VERSION }}.tar.xz -O /tmp/linux-${{ env.KERNEL_VERSION }}.tar.xz
        tar -xvf /tmp/linux-${{ env.KERNEL_VERSION }}.tar.xz -C kernel_build/

    - name: Configure kernel
      if: steps.cache-kernel.outputs.cache-hit != 'true'
      run: |
        cd kernel_build/linux-${{ env.KERNEL_VERSION }}
        make defconfig
        # 启用必要的功能
        sed -i 's/# CONFIG_NETWORK_FILESYSTEMS is not set/CONFIG_NETWORK_FILESYSTEMS=y/' .config
        sed -i 's/# CONFIG_NFS_FS is not set/CONFIG_NFS_FS=y/' .config
        sed -i 's/# CONFIG_SMB_FS is not set/CONFIG_SMB_FS=y/' .config
        sed -i 's/# CONFIG_USB_STORAGE is not set/CONFIG_USB_STORAGE=y/' .config
        sed -i 's/# CONFIG_FB is not set/CONFIG_FB=y/' .config
        sed -i 's/# CONFIG_FB_VESA is not set/CONFIG_FB_VESA=y/' .config
        sed -i 's/# CONFIG_SOUND is not set/CONFIG_SOUND=y/' .config

    - name: Build kernel
      if: steps.cache-kernel.outputs.cache-hit != 'true'
      run: |
        cd kernel_build/linux-${{ env.KERNEL_VERSION }}
        make -j$(nproc)

    - name: Upload kernel artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build
        path: kernel_build/
        retention-days: 1

  build-server:
    name: Build Server Edition
    runs-on: ubuntu-latest
    needs: build-kernel
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap qemu-utils xorriso grub2-common grub-pc-bin

    - name: Create directories
      run: |
        mkdir -p build/server
        mkdir -p iso/server

    - name: Download kernel artifact
      uses: actions/download-artifact@v4
      with:
        name: kernel-build
        path: kernel_build/

    - name: Create server root filesystem
      run: |
        # 使用debootstrap创建基本根文件系统
        sudo debootstrap --arch=i386 bullseye build/server/chroot http://deb.debian.org/debian/
        
        # 挂载必要的文件系统
        sudo mount -t proc proc build/server/chroot/proc/
        sudo mount -t sysfs sys build/server/chroot/sys/
        sudo mount -o bind /dev build/server/chroot/dev/
        
        # 安装必要的软件包
        sudo chroot build/server/chroot /bin/bash -c 'apt-get update && apt-get install -y apt-utils dialog'
        sudo chroot build/server/chroot /bin/bash -c 'apt-get install -y openssh-server net-tools iputils-ping curl wget'
        sudo chroot build/server/chroot /bin/bash -c 'apt-get install -y vim nano git'
        
        # 安装yum包管理器
        sudo chroot build/server/chroot /bin/bash -c 'apt-get install -y yum'
        
        # 配置网络
        sudo chroot build/server/chroot /bin/bash -c 'echo "auto eth0" > /etc/network/interfaces.d/eth0'
        sudo chroot build/server/chroot /bin/bash -c 'echo "iface eth0 inet dhcp" >> /etc/network/interfaces.d/eth0'
        
        # 创建用户
        sudo chroot build/server/chroot /bin/bash -c 'useradd -m -s /bin/bash user'
        sudo chroot build/server/chroot /bin/bash -c 'echo "user:password" | chpasswd'
        sudo chroot build/server/chroot /bin/bash -c 'usermod -aG sudo user'
        
        # 清理
        sudo chroot build/server/chroot /bin/bash -c 'apt-get clean'
        
        # 卸载文件系统
        sudo umount build/server/chroot/proc/
        sudo umount build/server/chroot/sys/
        sudo umount build/server/chroot/dev/

    - name: Create server ISO
      run: |
        # 复制内核
        cp kernel_build/linux-${{ env.KERNEL_VERSION }}/arch/x86/boot/bzImage iso/server/vmlinuz
        
        # 创建ISO目录结构
        mkdir -p iso/server/boot/grub
        
        # 查找并复制GRUB stage2_eltorito文件
        find /usr -name stage2_eltorito -type f
        cp $(find /usr -name stage2_eltorito -type f | head -1) iso/server/boot/grub/
        ls -la iso/server/boot/grub/
        
        # 创建GRUB配置文件
        echo 'set timeout=5' > iso/server/boot/grub/grub.cfg
        echo 'set default=0' >> iso/server/boot/grub/grub.cfg
        echo '' >> iso/server/boot/grub/grub.cfg
        echo 'menuentry "PicoKernel Server Edition" {' >> iso/server/boot/grub/grub.cfg
        echo '  linux /vmlinuz root=/dev/sda1 ro quiet' >> iso/server/boot/grub/grub.cfg
        echo '}' >> iso/server/boot/grub/grub.cfg
        
        # 创建ISO镜像
        xorriso -as mkisofs -R -b boot/grub/stage2_eltorito -no-emul-boot -boot-load-size 4 -boot-info-table -o build/server.iso iso/server/

    - name: Upload server ISO
      uses: actions/upload-artifact@v4
      with:
        name: pico-kernel-server
        path: build/server.iso

  build-desktop:
    name: Build Desktop Edition
    runs-on: ubuntu-latest
    needs: build-kernel
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap qemu-utils xorriso grub2-common grub-pc-bin

    - name: Create directories
      run: |
        mkdir -p build/desktop
        mkdir -p iso/desktop

    - name: Download kernel artifact
      uses: actions/download-artifact@v4
      with:
        name: kernel-build
        path: kernel_build/

    - name: Create desktop root filesystem
      run: |
        # 使用debootstrap创建基本根文件系统
        sudo debootstrap --arch=i386 bullseye build/desktop/chroot http://deb.debian.org/debian/
        
        # 挂载必要的文件系统
        sudo mount -t proc proc build/desktop/chroot/proc/
        sudo mount -t sysfs sys build/desktop/chroot/sys/
        sudo mount -o bind /dev build/desktop/chroot/dev/
        
        # 安装必要的软件包
        sudo chroot build/desktop/chroot /bin/bash -c 'apt-get update && apt-get install -y apt-utils dialog'
        sudo chroot build/desktop/chroot /bin/bash -c 'apt-get install -y xorg xserver-xorg-core xserver-xorg-video-vesa'
        sudo chroot build/desktop/chroot /bin/bash -c 'apt-get install -y lxde-core lxterminal'
        sudo chroot build/desktop/chroot /bin/bash -c 'apt-get install -y openssh-server net-tools iputils-ping curl wget'
        sudo chroot build/desktop/chroot /bin/bash -c 'apt-get install -y vim nano git'
        
        # 安装yum包管理器
        sudo chroot build/desktop/chroot /bin/bash -c 'apt-get install -y yum'
        
        # 配置网络
        sudo chroot build/desktop/chroot /bin/bash -c 'echo "auto eth0" > /etc/network/interfaces.d/eth0'
        sudo chroot build/desktop/chroot /bin/bash -c 'echo "iface eth0 inet dhcp" >> /etc/network/interfaces.d/eth0'
        
        # 创建用户
        sudo chroot build/desktop/chroot /bin/bash -c 'useradd -m -s /bin/bash user'
        sudo chroot build/desktop/chroot /bin/bash -c 'echo "user:password" | chpasswd'
        sudo chroot build/desktop/chroot /bin/bash -c 'usermod -aG sudo user'
        
        # 清理
        sudo chroot build/desktop/chroot /bin/bash -c 'apt-get clean'
        
        # 卸载文件系统
        sudo umount build/desktop/chroot/proc/
        sudo umount build/desktop/chroot/sys/
        sudo umount build/desktop/chroot/dev/

    - name: Create desktop ISO
      run: |
        # 复制内核
        cp kernel_build/linux-${{ env.KERNEL_VERSION }}/arch/x86/boot/bzImage iso/desktop/vmlinuz
        
        # 创建ISO目录结构
        mkdir -p iso/desktop/boot/grub
        
        # 查找并复制GRUB stage2_eltorito文件
        find /usr -name stage2_eltorito -type f
        cp $(find /usr -name stage2_eltorito -type f | head -1) iso/desktop/boot/grub/
        ls -la iso/desktop/boot/grub/
        
        # 创建GRUB配置文件
        echo 'set timeout=5' > iso/desktop/boot/grub/grub.cfg
        echo 'set default=0' >> iso/desktop/boot/grub/grub.cfg
        echo '' >> iso/desktop/boot/grub/grub.cfg
        echo 'menuentry "PicoKernel Desktop Edition" {' >> iso/desktop/boot/grub/grub.cfg
        echo '  linux /vmlinuz root=/dev/sda1 ro quiet' >> iso/desktop/boot/grub/grub.cfg
        echo '}' >> iso/desktop/boot/grub/grub.cfg
        
        # 创建ISO镜像
        xorriso -as mkisofs -R -b boot/grub/stage2_eltorito -no-emul-boot -boot-load-size 4 -boot-info-table -o build/desktop.iso iso/desktop/

    - name: Upload desktop ISO
      uses: actions/upload-artifact@v4
      with:
        name: pico-kernel-desktop
        path: build/desktop.iso
