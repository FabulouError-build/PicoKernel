name: Build Linux Kernel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev

    - name: Create directories
      run: |
        mkdir -p linux
        mkdir -p kernel_build

    - name: Download Linux kernel
      run: |
        if [ ! -f "linux/linux-6.10.7.tar.xz" ]; then
          wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.10.7.tar.xz -O linux/linux-6.10.7.tar.xz
        fi

    - name: Extract Linux kernel
      run: |
        tar -xvf linux/linux-6.10.7.tar.xz -C kernel_build/

    - name: Configure kernel
      run: |
        cd kernel_build/linux-6.10.7
        make defconfig

    - name: Build kernel
      run: |
        cd kernel_build/linux-6.10.7
        make -j$(nproc)

    - name: Rename kernel image with suffix
      run: |
        cp kernel_build/linux-6.10.7/arch/x86/boot/bzImage kernel_build/linux-6.10.7/arch/x86/boot/bzImage.bin

    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: linux-kernel
        path: kernel_build/linux-6.10.7/arch/x86/boot/bzImage.bin
